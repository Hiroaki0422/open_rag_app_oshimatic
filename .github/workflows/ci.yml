name: ci
on:
  push:
  pull_request:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.3"
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run python scripts/check_repository.py
      - run: uv run pytest tests/unit tests/golden
      - run: docker compose config --quiet
      - run: docker compose build api
      - run: docker compose up -d --wait opensearch
      - run: uv run pytest -m integration
        env:
          RAG_LIVE_OPENSEARCH_URL: http://localhost:9200
      - if: always()
        run: docker compose down
      - run: uv build
      - run: uv run python scripts/verify_wheel.py
